syntax = "proto3";

package filer;

option go_package = "github.com/accretional/runrpc/filer";

import "filer/plan92.proto";

message StoreAddress {
  string path = 1;
  Storage storage = 2;
  StorageFormat format = 3;
  int64 total = 4;
}

message ResourceDefinition {
  Resource resource = 1;
  StoreAddress address = 2;
  bytes value = 3;
}

enum Storage {
  STORAGE_UNKNOWN = 0;
  // eg encoded in the binary
  Immutable = 1;
  Memory = 2;
  Block = 3;
  Blob = 4;
}

// File stores are encoded in a few formats
enum StorageFormat {
  STORAGE_FORMAT_UNKNOWN = 0;
  BinaryProto = 1;
  TextProto = 2;
  // Single type, sequential starting from the end of the File [message] int64 message_len
  Sequence = 3;
  // Later add gzip, etc
}

service Storer {
  rpc Store(ResourceDefinition) returns(StoreAddress);
  rpc Append(stream ResourceDefinition) returns(stream StoreAddress);
  rpc Load(Resource) returns (ResourceDefinition);
  rpc Read(stream Resource) returns (stream ResourceDefinition);
}
